<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0b0d0b"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Fuel Log"/>
  <title>Fuel Log</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0d0b; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input::placeholder, textarea::placeholder { color: #2a3228; }
    select { background: #0b0d0b; color: #d8e8d0; }
    #update-banner {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: #1c201c; border-top: 1px solid #a3ff4b;
      padding: 14px 20px; align-items: center; justify-content: space-between; gap: 12px;
    }
    #update-banner.show { display: flex; }
    #update-banner span { color: #d8e8d0; font-size: 14px; }
    #update-banner button {
      background: #a3ff4b; color: #0b0d0b; border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="update-banner">
    <span>A new version of Fuel Log is ready.</span>
    <button id="update-btn">Reload</button>
  </div>

  <!-- CDN dependencies — loaded before app.js -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <script>
    // localStorage bridge — matches window.storage API used in app
    window.storage = {
      get:    async k => { const v = localStorage.getItem(k); return v !== null ? { value: v } : null; },
      set:    async (k, v) => { localStorage.setItem(k, String(v)); return { value: v }; },
      delete: async k => { localStorage.removeItem(k); return { deleted: true }; },
    };

    // Service worker — register and handle update banner
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(reg => {
          const showBanner = waitingSW => {
            const banner = document.getElementById("update-banner");
            banner.classList.add("show");
            document.getElementById("update-btn").onclick = () => {
              waitingSW.postMessage({ type: "SKIP_WAITING" });
            };
          };

          if (reg.waiting) showBanner(reg.waiting);

          reg.addEventListener("updatefound", () => {
            const sw = reg.installing;
            sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller) {
                showBanner(sw);
              }
            });
          });
        }).catch(() => {});

        // When a new SW takes control, reload to pick up fresh assets
        let reloading = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!reloading) { reloading = true; location.reload(); }
        });
      });
    }

    // Make React hooks and Recharts available as globals for the compiled app
    const { useState, useEffect } = React;
    const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell,
            XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;
  </script>

  <!-- Pre-compiled app — no Babel, no line limit -->
  <script src="app.js"></script>
</body>
</html>
