  <script>
    /* Flash-free theme init: apply a saved manual override before first paint, and keep
       the browser chrome (theme-color) in sync. "system" leaves no attribute so the OS drives it. */
    (function () {
      try {
        var t = localStorage.getItem("fuel_theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
      function syncChrome() {
        var c = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim();
        var m = document.querySelector('meta[name="theme-color"]');
        if (c && m) m.setAttribute("content", c);
      }
      syncChrome();
      window.__fuelSyncChrome = syncChrome;
      try {
        matchMedia("(prefers-color-scheme: dark)").addEventListener("change", syncChrome);
      } catch (e) {}
    })();
  </script>

  <script>
    // localStorage bridge — matches window.storage API used in app
    window.storage = {
      get:    async k => { const v = localStorage.getItem(k); return v !== null ? { value: v } : null; },
      set:    async (k, v) => { localStorage.setItem(k, String(v)); return { value: v }; },
      delete: async k => { localStorage.removeItem(k); return { deleted: true }; },
    };

    // Service worker — register in PRODUCTION only.
    // On localhost/127.0.0.1 (or file://) the SW is skipped, and any existing
    // registration is removed, so local dev never serves a stale cached bundle.
    // Opt-in override: add ?sw to the URL to force-register on localhost (e.g. for a
    // Lighthouse installability/PWA audit). Default localhost behaviour is unchanged.
    var SW_FORCE = /[?&]sw\b/.test(location.search);
    var SW_HOST_OK = SW_FORCE || !["localhost", "127.0.0.1", ""].includes(location.hostname);
    if ("serviceWorker" in navigator && !SW_HOST_OK) {
      navigator.serviceWorker.getRegistrations()
        .then(regs => regs.forEach(r => r.unregister())).catch(() => {});
    }
    // Service worker — register and handle update banner
    if ("serviceWorker" in navigator && SW_HOST_OK) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(reg => {
          const showBanner = waitingSW => {
            const banner = document.getElementById("update-banner");
            banner.classList.add("show");
            document.getElementById("update-btn").onclick = () => {
              waitingSW.postMessage({ type: "SKIP_WAITING" });
            };
          };

          if (reg.waiting) showBanner(reg.waiting);

          reg.addEventListener("updatefound", () => {
            const sw = reg.installing;
            sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller) {
                showBanner(sw);
              }
            });
          });
        }).catch(() => {});

        // When a new SW takes control, reload to pick up fresh assets
        let reloading = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!reloading) { reloading = true; location.reload(); }
        });
      });
    }

    // Expose React hooks and Recharts components as explicit window globals.
    // Using window.X = ... (not const) ensures app.js can access them regardless
    // of strict-mode 'this' context differences across mobile browsers.
    window.useState  = React.useState;
    window.useEffect = React.useEffect;
    (function() {

      window.LineChart         = R.LineChart;
      window.Line              = R.Line;
      window.BarChart          = R.BarChart;
      window.Bar               = R.Bar;
      window.PieChart          = R.PieChart;
      window.Pie               = R.Pie;
      window.Cell              = R.Cell;
      window.XAxis             = R.XAxis;
      window.YAxis             = R.YAxis;
      window.Tooltip           = R.Tooltip;
      window.ResponsiveContainer = R.ResponsiveContainer;
    })();
  </script>
