<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Fuel Log — Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 0 40px;
      min-height: 100vh;
      font-family: -apple-system, sans-serif;
      gap: 16px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .toolbar button {
      background: #2a2a4a;
      color: #aaa;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #3a3a5a; color: #fff; }
    .toolbar button.active { background: #4a4aaa; color: #fff; border-color: #7777ff; }

    .label { color: #555; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

    /* Main row: phone + dev panel side by side */
    .main-row {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .phone {
      background: #111;
      border-radius: 44px;
      padding: 12px;
      box-shadow: 0 0 0 2px #333, 0 0 0 4px #1a1a1a, 0 30px 80px rgba(0,0,0,0.7);
    }

    .screen {
      border-radius: 32px;
      overflow: hidden;
      position: relative;
    }

    /* The app lives inside this clipped container */
    #app-shell {
      width: 390px;
      height: 844px;
      overflow-y: auto;
      overflow-x: hidden;
      background: #0b0d0b;
      position: relative;
      scrollbar-width: none;
    }
    #app-shell::-webkit-scrollbar { display: none; }

    #app-shell * { box-sizing: border-box; }
    #root { min-height: 100%; }

    /* Dev panel */
    .dev-panel {
      width: 200px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 12px;
    }
    .dev-panel h3 {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #556;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .dev-section {
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dev-section label {
      font-size: 11px;
      color: #778;
      letter-spacing: 0.5px;
    }
    .dev-section .dev-value {
      font-size: 13px;
      color: #a3ff4b;
      font-weight: 700;
      font-family: monospace;
    }
    .dev-btn {
      background: #1e1e4a;
      color: #a3ff4b;
      border: 1px solid #3a3a7a;
      border-radius: 7px;
      padding: 9px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      width: 100%;
      text-align: left;
    }
    .dev-btn:hover { background: #2a2a6a; }
    .dev-input {
      width: 100%;
      background: #0d0d22;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 7px 10px;
      color: #d8e8d0;
      font-size: 13px;
      outline: none;
    }
    .dev-input:focus { border-color: #4a4aaa; }
    .dev-submit {
      background: #1e1e4a;
      color: #aaa;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
      width: 100%;
    }
    .dev-submit:hover { background: #2a2a6a; color: #fff; }

    .size-label { color: #444; font-size: 11px; letter-spacing: 1px; }
  </style>

  <!-- App dependencies (same as index.html) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="recharts.js"></script>
</head>
<body>

  <div class="toolbar">
    <span class="label">Device</span>
    <button class="active" onclick="setDevice(390,844,this)">iPhone 14</button>
    <button onclick="setDevice(412,915,this)">Pixel 7</button>
    <button onclick="setDevice(375,667,this)">iPhone SE</button>
    <span class="label" style="margin-left:6px">|</span>
    <button onclick="document.getElementById('app-shell').scrollTop=0; location.reload()">⟳ Reload</button>
    <span class="label" style="margin-left:6px">|</span>
    <button onclick="if(window.seedFuelLog){seedFuelLog();setTimeout(()=>location.reload(),300)}else{alert('seed-data.js not loaded')}" title="Populate 6 months of realistic data">⚡ Seed Data</button>
  </div>

  <div class="main-row">

    <div class="phone">
      <div class="screen">
        <div id="app-shell">
          <div id="root"></div>
        </div>
      </div>
    </div>

    <!-- Dev controls — outside the phone border -->
    <div class="dev-panel">

      <div class="dev-section">
        <h3>Simulated Date</h3>
        <label>Current</label>
        <div class="dev-value" id="sim-date-display">—</div>
        <button class="dev-btn" onclick="progressDay()">▶ Progress Day</button>
        <button class="dev-btn" style="color:#ff7b4b; border-color:#4a2a2a; background:#1a0e0e"
          onclick="resetDay()">↺ Reset to Today</button>
      </div>

      <div class="dev-section">
        <h3>Simulated Time</h3>
        <label>Current hour</label>
        <div class="dev-value" id="sim-time-display">—</div>
        <input id="dev-time-input" class="dev-input" type="time" placeholder="HH:MM"/>
        <button class="dev-submit" onclick="updateTime()">Update Coach Tip</button>
        <button class="dev-submit" style="margin-top:2px" onclick="clearTime()">Use real time</button>
      </div>

    </div>
  </div>

  <div class="size-label" id="size-label">390 × 844</div>

  <script>
    // Unregister any service workers on this origin — the production SW must not intercept dev requests
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
  </script>

  <script>
    // Storage bridge (same as index.html)
    window.storage = {
      get:    async k => { const v = localStorage.getItem(k); return v !== null ? { value: v } : null; },
      set:    async (k, v) => { localStorage.setItem(k, String(v)); return { value: v }; },
      delete: async k => { localStorage.removeItem(k); return { deleted: true }; },
    };

    // Expose globals the app expects
    const { useState, useEffect } = React;
    const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell,
            XAxis, YAxis, Tooltip, ResponsiveContainer } = (typeof Recharts !== "undefined" ? Recharts : {});

    function setDevice(w, h, btn) {
      const shell = document.getElementById("app-shell");
      shell.style.width  = w + "px";
      shell.style.height = h + "px";
      document.getElementById("size-label").textContent = w + " × " + h;
      document.querySelectorAll(".toolbar button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }

    // ── Dev helpers ──────────────────────────────────────────────

    function getSimDateOffset() {
      return parseInt(localStorage.getItem("dev_date_offset") || "0") || 0;
    }

    function getSimTodayKey() {
      const off = getSimDateOffset();
      const d   = new Date(Date.now() + off * 86400000);
      return d.getFullYear() + "-" +
        String(d.getMonth() + 1).padStart(2, "0") + "-" +
        String(d.getDate()).padStart(2, "0");
    }

    function updateDisplays() {
      const off  = getSimDateOffset();
      const key  = getSimTodayKey();
      document.getElementById("sim-date-display").textContent =
        off === 0 ? key + " (real)" : key + " (+" + off + "d)";

      const h = localStorage.getItem("dev_time_hour");
      document.getElementById("sim-time-display").textContent =
        h !== null ? h.padStart(2,"0") + ":00 (sim)" : new Date().getHours() + ":00 (real)";
    }

    function progressDay() {
      const off = getSimDateOffset();
      localStorage.setItem("dev_date_offset", String(off + 1));
      location.reload();
    }

    function resetDay() {
      localStorage.removeItem("dev_date_offset");
      location.reload();
    }

    function updateTime() {
      const val = document.getElementById("dev-time-input").value;
      if (!val) return;
      const h = parseInt(val.split(":")[0]);
      localStorage.setItem("dev_time_hour", String(h));
      // Clear coach cache for today's simulated key so it regenerates
      localStorage.removeItem("coach__" + getSimTodayKey());
      updateDisplays();
      // Trigger in-app coach refresh without reloading
      if (window.__devRefreshCoach) {
        window.__devRefreshCoach();
      }
    }

    function clearTime() {
      localStorage.removeItem("dev_time_hour");
      localStorage.removeItem("coach__" + getSimTodayKey());
      updateDisplays();
      if (window.__devRefreshCoach) window.__devRefreshCoach();
    }

    // Show current state on load
    window.addEventListener("load", updateDisplays);
  </script>

  <!-- Seed helper (dev only) -->
  <script src="seed-data.js"></script>

  <!-- App -->
  <script src="app.js"></script>

</body>
</html>
